---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: APP-backup
spec:
  sourcePVC: APP
  trigger:
    schedule: "0 */6 * * *"
  restic:
    pruneIntervalDays: 7
    repository: APP-volsync-restic
    retain:
      daily: 7
      weekly: 4
      monthly: 3
    copyMethod: Snapshot
    storageClassName: ceph-bulk
    volumeSnapshotClassName: csi-ceph-blockpool
    cacheStorageClassName: local-nvme
    cacheCapacity: 2Gi
