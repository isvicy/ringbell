---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${APP}
spec:
  accessModes: ["ReadWriteOnce"]
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: ${APP}
  resources:
    requests:
      storage: ${VOLSYNC_CAPACITY:-5Gi}
  storageClassName: ${VOLSYNC_STORAGECLASS:-local-nvme}
