---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: APP
spec:
  accessModes: ["ReadWriteOnce"]
  # Auto-restore from the latest backup on a fresh cluster: the PVC populates
  # itself from the ReplicationDestination instead of starting empty.
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: APP
  resources:
    requests:
      storage: CAPACITY
  storageClassName: ceph-bulk
