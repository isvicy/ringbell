---
# Argo CD self-management: after the one-time `helm install argocd`, this
# Application reconciles the argo-cd chart so future upgrades are GitOps
# (bump targetRevision / edit values/argocd.yaml -> selfHeal applies).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  sources:
    - repoURL: https://github.com/isvicy/ringbell.git
      targetRevision: main
      ref: values
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.22
      helm:
        releaseName: argocd
        valueFiles:
          - $values/kubernetes/argocd/values/argocd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    # argocd-server writes server.secretkey / admin.password(Mtime) / tls.* into
    # argocd-secret at RUNTIME; the chart renders it empty. Ignore /data so a
    # self-managing sync never wipes login keys or invalidates live sessions
    # (argo-helm#200). Honoured at sync time via RespectIgnoreDifferences below.
    - group: ""
      kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      # prune OFF on the control plane: a bad render must never delete argocd
      # itself (CRDs are also resource-policy=keep). selfHeal ON so edits to
      # values/argocd.yaml auto-apply — the whole point of self-management.
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
