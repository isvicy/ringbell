---
# Argo CD self-management: after the one-time `helm install argocd`, this
# Application reconciles the argo-cd chart so future upgrades are GitOps
# (bump targetRevision / edit values/argocd.yaml -> selfHeal applies).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  sources:
    - repoURL: https://github.com/isvicy/ringbell.git
      targetRevision: main
      ref: values
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.22
      helm:
        releaseName: argocd
        valueFiles:
          - $values/kubernetes/argocd/values/argocd.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
