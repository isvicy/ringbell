---
# argo-cd Helm chart values — chart 9.5.22 -> Argo CD v3.4.4
global:
  domain: argocd.ringbell.cc

# --- Observability: expose Prometheus metrics + a ServiceMonitor for every
# component so the GitOps control plane isn't a blind spot (kube-prometheus-stack
# scrapes all ServiceMonitors). Replaces the flux-monitoring removed in migration.
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

configs:
  params:
    # TLS is terminated upstream at the Cilium Gateway; run argocd-server insecure.
    server.insecure: true
    # SSA-based diff: without it, Gateway API HTTPRoute (and other CRDs the API
    # server applies defaults to) show perpetual OutOfSync from those default
    # fields. ServerSideDiff computes the diff via an apply dry-run instead.
    controller.diff.server.side: "true"
  cm:
    # Adopt Flux-created resources without churn: track ownership via annotation
    # rather than the app.kubernetes.io/instance label (Helm charts already set it).
    application.resourceTrackingMethod: annotation

    # --- SSO via Authelia (OIDC) ---
    # Web UI = confidential `argocd` client; CLI (`argocd login --sso`) = public
    # `argocd-cli` client (PKCE). Argo CD cannot combine PKCE with a client secret
    # on one client (argoproj/argo-cd#23773), hence the two-client split.
    # clientSecret resolves from the ESO-synced argocd-oidc Secret (see extraObjects);
    # groups ride in the id_token (Authelia claims_policy) for RBAC.
    oidc.config: |
      name: Authelia
      issuer: https://auth.ringbell.cc
      clientID: argocd
      clientSecret: $argocd-oidc:clientSecret
      cliClientID: argocd-cli
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      requestedIDTokenClaims:
        groups:
          essential: true

    # --- custom health for CRDs Argo cannot assess natively ---
    resource.customizations.health.ceph.rook.io_CephCluster: |
      local hs = {}
      if obj.status ~= nil and obj.status.phase ~= nil then
        hs.status = "Progressing"
        hs.message = obj.status.phase
        if obj.status.ceph ~= nil and obj.status.ceph.health ~= nil then
          hs.message = obj.status.phase .. " / " .. obj.status.ceph.health
          if obj.status.ceph.health == "HEALTH_ERR" then
            hs.status = "Degraded"
            return hs
          end
        end
        if obj.status.phase == "Ready" then
          hs.status = "Healthy"
        end
        return hs
      end
      hs.status = "Progressing"
      hs.message = "Waiting for CephCluster status"
      return hs
    resource.customizations.health.ceph.rook.io_CephBlockPool: |
      local hs = {}
      if obj.status ~= nil and obj.status.phase == "Ready" then
        hs.status = "Healthy"
        hs.message = "Ready"
        return hs
      end
      hs.status = "Progressing"
      hs.message = "Waiting for CephBlockPool"
      return hs
    resource.customizations.health.ceph.rook.io_CephFilesystem: |
      local hs = {}
      if obj.status ~= nil and obj.status.phase == "Ready" then
        hs.status = "Healthy"
        hs.message = "Ready"
        return hs
      end
      hs.status = "Progressing"
      hs.message = "Waiting for CephFilesystem"
      return hs
    resource.customizations.health.gateway.networking.k8s.io_Gateway: |
      local hs = {}
      if obj.status ~= nil and obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Programmed" and c.status == "True" then
            hs.status = "Healthy"
            hs.message = c.message or "Programmed"
            return hs
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for Gateway to be Programmed"
      return hs

  rbac:
    # Authenticated SSO users get read-only; the `admins` Authelia group (already
    # used by Grafana) is granted full admin. RBAC matches on the groups claim.
    policy.default: role:readonly
    scopes: '[groups]'
    policy.csv: |
      g, admins, role:admin

extraObjects:
  # OIDC client secret synced from 1Password (item `argocd`, field oidc-client-secret).
  # The app.kubernetes.io/part-of: argocd label lets argocd-cm reference it via
  # $argocd-oidc:clientSecret.
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: argocd-oidc
      namespace: argocd
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword
      target:
        name: argocd-oidc
        creationPolicy: Owner
        template:
          metadata:
            labels:
              app.kubernetes.io/part-of: argocd
      data:
        - secretKey: clientSecret
          remoteRef:
            key: argocd
            property: oidc-client-secret
  # LAN access: external-dns creates a DNS-only A record for argocd.ringbell.cc
  # at the internal Cilium gateway; TLS terminates there (argocd-server runs insecure).
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: argocd
      namespace: argocd
    spec:
      hostnames:
        - argocd.ringbell.cc
      parentRefs:
        - name: internal
          namespace: networking
      rules:
        - backendRefs:
            - name: argocd-server
              port: 80
