---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: ringbell.cc
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 3
      Monitoring:
        style: row
        columns: 2
  bookmarks.yaml: ""
  services.yaml: |
    - Infrastructure:
        - Ceph Dashboard:
            href: https://ceph.ringbell.cc
            description: Ceph Storage Dashboard
            icon: ceph
        - Authelia:
            href: https://auth.ringbell.cc
            description: Authentication Portal
            icon: authelia
    - Monitoring:
        - Grafana:
            href: https://grafana.ringbell.cc
            description: Grafana Dashboards
            icon: grafana
        - Prometheus:
            href: https://prometheus.ringbell.cc
            description: Prometheus Metrics
            icon: prometheus
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          showLabel: true
          label: ringbell
        nodes:
          show: true
          showLabel: true
    - search:
        provider: google
        target: _blank
  custom.css: ""
  custom.js: ""
  docker.yaml: ""
