---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: ringbell.cc
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 4
      Monitoring:
        style: row
        columns: 4
  bookmarks.yaml: ""
  services.yaml: |
    - Infrastructure:
        - Ceph Dashboard:
            href: https://ceph.ringbell.cc
            description: Ceph Storage Dashboard
            icon: ceph
        - Authelia:
            href: https://auth.ringbell.cc
            description: Authentication Portal
            icon: authelia
        - Harbor:
            href: https://harbor.ringbell.cc
            description: Container Registry
            icon: harbor
        - Proxmox VE:
            href: https://proxmox.ringbell.cc
            description: Hypervisor Management
            icon: proxmox
    - Monitoring:
        - Grafana:
            href: https://grafana.ringbell.cc
            description: Grafana Dashboards
            icon: grafana
        - Grafana Host:
            href: https://grafana-host.ringbell.cc
            description: Unraid Host Monitoring
            icon: grafana
        - Prometheus:
            href: https://prometheus.ringbell.cc
            description: Prometheus Metrics
            icon: prometheus
        - Hubble:
            href: https://hubble.ringbell.cc
            description: Network Observability
            icon: cilium
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: ringbell
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
  custom.css: ""
  custom.js: ""
  docker.yaml: ""
