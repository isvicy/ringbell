---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: e2e-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e2e-test
    spec:
      initContainers:
        - name: init-storage
          image: docker.io/library/busybox:1.37
          command: ["/bin/sh", "/scripts/init.sh"]
          volumeMounts:
            - name: local-nvme
              mountPath: /data/local-nvme
            - name: ceph-bulk
              mountPath: /data/ceph-bulk
            - name: nfs
              mountPath: /data/nfs
            - name: iscsi
              mountPath: /data/iscsi
            - name: scripts
              mountPath: /scripts/init.sh
              subPath: init.sh
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: docker.io/library/nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: local-nvme
              mountPath: /data/local-nvme
              readOnly: true
            - name: ceph-bulk
              mountPath: /data/ceph-bulk
              readOnly: true
            - name: nfs
              mountPath: /data/nfs
              readOnly: true
            - name: iscsi
              mountPath: /data/iscsi
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: local-nvme
          persistentVolumeClaim:
            claimName: e2e-local-nvme
        - name: ceph-bulk
          persistentVolumeClaim:
            claimName: e2e-ceph-bulk
        - name: nfs
          persistentVolumeClaim:
            claimName: e2e-nfs
        - name: iscsi
          persistentVolumeClaim:
            claimName: e2e-iscsi
        - name: scripts
          configMap:
            name: e2e-test-config
            defaultMode: 0755
        - name: nginx-conf
          configMap:
            name: e2e-test-config
        - name: html
          emptyDir: {}
