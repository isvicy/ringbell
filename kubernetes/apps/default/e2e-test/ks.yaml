---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: e2e-test
  namespace: flux-system
spec:
  targetNamespace: default
  path: ./kubernetes/apps/default/e2e-test/app
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  dependsOn:
    - name: rook-ceph-cluster
    - name: nfs-provisioner
    - name: synology-csi
    - name: cloudflared
    - name: external-dns
