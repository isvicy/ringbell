---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-oidc-jwks
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: oidc-jwks
    creationPolicy: Owner
  data:
    - secretKey: oidc-jwks-rsa-key
      remoteRef:
        key: authelia
        property: oidc-jwks-private-key
