---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  interval: 30m
  chart:
    spec:
      chart: authelia
      version: "0.10.50"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    pod:
      kind: Deployment
      replicas: 1
      extraVolumeMounts:
        - name: users
          mountPath: /config/users.yaml
          subPath: users.yaml
          readOnly: true
      extraVolumes:
        - name: users
          secret:
            secretName: authelia-secret
            items:
              - key: users-yaml
                path: users.yaml
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 1Gi

    secret:
      existingSecret: authelia-secret

    configMap:
      theme: dark

      log:
        level: info

      totp:
        issuer: ringbell.cc

      authentication_backend:
        file:
          enabled: true
          path: /config/users.yaml
          password:
            algorithm: argon2
            argon2:
              variant: argon2id
              iterations: 3
              memory: 65536
              parallelism: 4
              key_length: 32
              salt_length: 16

      session:
        cookies:
          - domain: ringbell.cc
            subdomain: auth-tunnel
            default_redirection_url: https://home-tunnel.ringbell.cc

      storage:
        local:
          enabled: true
          path: /config/db.sqlite3

      notifier:
        filesystem:
          enabled: true
          filename: /config/notification.txt

      access_control:
        default_policy: one_factor
        rules:
          - domain: auth.ringbell.cc
            policy: bypass

    persistence:
      enabled: true
      storageClass: ceph-block
      size: 1Gi
