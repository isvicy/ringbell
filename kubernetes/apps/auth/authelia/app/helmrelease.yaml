---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  interval: 30m
  chart:
    spec:
      chart: authelia
      version: "0.10.50"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    pod:
      kind: Deployment
      replicas: 1
      extraVolumeMounts:
        - name: users
          mountPath: /config/users.yaml
          subPath: users.yaml
          readOnly: true
      extraVolumes:
        - name: users
          secret:
            secretName: authelia-secret
            items:
              - key: users-yaml
                path: users.yaml
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 1Gi

    secret:
      existingSecret: authelia-secret
      additionalSecrets:
        oidc-jwks:
          items:
            - key: oidc-jwks-rsa-key
              path: private.pem

    configMap:
      theme: dark

      log:
        level: info

      totp:
        issuer: ringbell.cc

      authentication_backend:
        file:
          enabled: true
          path: /config/users.yaml
          password:
            algorithm: argon2
            argon2:
              variant: argon2id
              iterations: 3
              memory: 65536
              parallelism: 4
              key_length: 32
              salt_length: 16

      session:
        cookies:
          - domain: ringbell.cc
            subdomain: auth-tunnel
            default_redirection_url: https://home-tunnel.ringbell.cc

      storage:
        local:
          enabled: true
          path: /config/db.sqlite3

      notifier:
        filesystem:
          enabled: true
          filename: /config/notification.txt

      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: default
              algorithm: RS256
              use: sig
              key:
                path: /secrets/oidc-jwks/private.pem
          cors:
            endpoints:
              - authorization
              - token
              - revocation
              - introspection
              - userinfo
            allowed_origins_from_client_redirect_uris: true
          claims_policies:
            grafana:
              id_token:
                - email
                - name
                - groups
                - preferred_username
          clients:
            - client_id: grafana
              client_name: Grafana
              client_secret: '$pbkdf2-sha512$310000$HC71gMzoLNH93ZUOqNl0Eg$9YXtE35tUmkTkPVth/4v4srunmg6lBbYn2GcjSXVQYB8LTGFMgX7CAchFyPsziLE1lI4Dwk9nxidKc1C8ujEIg'
              public: false
              authorization_policy: one_factor
              claims_policy: grafana
              require_pkce: true
              pkce_challenge_method: S256
              redirect_uris:
                - https://grafana.ringbell.cc/login/generic_oauth
              scopes:
                - openid
                - profile
                - email
                - groups
              grant_types:
                - authorization_code
                - refresh_token
              response_types:
                - code
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: grafana-host
              client_name: Grafana Host
              client_secret: '$pbkdf2-sha512$310000$rukgYpUl7XblcxseKpIuoA$7ocG9FzWItCdgfGHh3zWYw7Fb9VVARxNYN.nfEGW3H4tdZkA3YlRryAviHu4elsUIvGrDMVoPMaElCp0QAoZWQ'
              public: false
              authorization_policy: one_factor
              claims_policy: grafana
              require_pkce: true
              pkce_challenge_method: S256
              redirect_uris:
                - https://grafana-host.ringbell.cc/login/generic_oauth
              scopes:
                - openid
                - profile
                - email
                - groups
              grant_types:
                - authorization_code
                - refresh_token
              response_types:
                - code
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic
            - client_id: harbor
              client_name: Harbor
              client_secret: '$pbkdf2-sha512$310000$wbJQp2.y93biyyZ8un8fgw$T0a4KCBqwpqAwJtLb03nBQI568/GmDkH8Wm2wLay4iAL7koImwgKw0Qn9XLmWgzvYwtBNcXy8sUys./DfE11xg'
              public: false
              authorization_policy: one_factor
              claims_policy: grafana
              require_pkce: false
              redirect_uris:
                - https://harbor.ringbell.cc/c/oidc/callback
              scopes:
                - openid
                - profile
                - email
                - groups
              grant_types:
                - authorization_code
                - refresh_token
              response_types:
                - code
              userinfo_signed_response_alg: none
              token_endpoint_auth_method: client_secret_basic

      access_control:
        default_policy: one_factor
        rules:
          - domain: auth.ringbell.cc
            policy: bypass

    persistence:
      enabled: true
      storageClass: ceph-block
      size: 1Gi
