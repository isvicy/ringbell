---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garmin-connect
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: garmin-connect-secret
    creationPolicy: Owner
  data:
    - secretKey: GARMINCONNECT_EMAIL
      remoteRef:
        key: garmin-connect
        property: email
    - secretKey: GARMINCONNECT_BASE64_PASSWORD
      remoteRef:
        key: garmin-connect
        property: password-base64
