---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: influxdb
spec:
  interval: 30m
  chart:
    spec:
      chart: influxdb
      version: "4.12.5"
      sourceRef:
        kind: HelmRepository
        name: influxdata
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    image:
      tag: "1.11-alpine"

    persistence:
      enabled: true
      storageClass: nfs-unraid
      size: 5Gi

    config:
      http:
        enabled: true
        bind-address: ":8086"
        auth-enabled: false
        flux-enabled: true

    initScripts:
      enabled: true
      scripts:
        init.iql: |+
          CREATE DATABASE "GarminStats" WITH DURATION INF REPLICATION 1 NAME "autogen"
