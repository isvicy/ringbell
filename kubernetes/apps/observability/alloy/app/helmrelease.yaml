---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: alloy
      version: "1.6.2"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controller:
      type: daemonset

    alloy:
      mounts:
        varlog: true

      configMap:
        content: |
          // Discover pods on this node only
          discovery.kubernetes "pods" {
            role = "pod"
            selectors {
              role  = "pod"
              field = "spec.nodeName=" + sys.env("HOSTNAME")
            }
          }

          // Extract metadata labels and construct log file path
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "app"
            }

            // Construct __path__ for CRI log files
            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              action        = "replace"
              replacement   = "/var/log/pods/*$1/*.log"
              target_label  = "__path__"
            }
          }

          // Match log files on the local filesystem
          local.file_match "pods" {
            path_targets = discovery.relabel.pods.output
          }

          // Tail matched log files
          loki.source.file "pods" {
            targets       = local.file_match.pods.targets
            tail_from_end = true
            forward_to    = [loki.process.pods.receiver]
          }

          // Parse CRI format and promote stream label
          loki.process "pods" {
            forward_to = [loki.write.default.receiver]

            stage.cri {}

            stage.labels {
              values = {
                stream = "",
              }
            }

            stage.label_drop {
              values = ["filename"]
            }
          }

          // Write logs to Loki
          loki.write "default" {
            endpoint {
              url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
            }
          }

          // Accept OTLP traces and forward to Tempo
          otelcol.receiver.otlp "default" {
            grpc {
              endpoint = "0.0.0.0:4317"
            }
            http {
              endpoint = "0.0.0.0:4318"
            }

            output {
              traces = [otelcol.exporter.otlp.tempo.input]
            }
          }

          otelcol.exporter.otlp "tempo" {
            client {
              endpoint = "tempo.observability.svc.cluster.local:4317"
              tls {
                insecure = true
              }
            }
          }

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    serviceMonitor:
      enabled: true
