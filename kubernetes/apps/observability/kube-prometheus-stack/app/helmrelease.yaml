---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.15.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      enabled: true

    prometheus:
      prometheusSpec:
        enableRemoteWriteReceiver: true
        retention: 14d
        retentionSize: "40GB"
        walCompression: true
        scrapeInterval: 60s
        evaluationInterval: 60s
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-nvme
              resources:
                requests:
                  storage: 50Gi
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false

    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-nvme
              resources:
                requests:
                  storage: 1Gi

    grafana:
      defaultDashboardsEnabled: true
      rbac:
        create: true
        namespaced: false
      persistence:
        enabled: false
      plugins:
        - marcusolsson-hourly-heatmap-panel
        - grafana-lokiexplore-app
        - grafana-exploretraces-app
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          access: proxy
          url: http://loki.observability.svc.cluster.local:3100
          jsonData:
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":\s*"(\w+)"'
                name: TraceID
                url: "${__value.raw}"
              - datasourceUid: tempo
                matcherRegex: 'trace_id=(\w+)'
                name: TraceID
                url: "${__value.raw}"
        - name: Tempo
          type: tempo
          uid: tempo
          access: proxy
          url: http://tempo.observability.svc.cluster.local:3200
          jsonData:
            httpMethod: GET
            tracesToLogsV2:
              datasourceUid: loki
              spanStartTimeShift: "-1h"
              spanEndTimeShift: "1h"
              filterByTraceID: true
              filterBySpanID: false
              customQuery: true
              query: '{${__tags}} |= "${__span.traceId}"'
              tags:
                - key: service.name
                  value: service_name
                - key: k8s.namespace.name
                  value: namespace
            tracesToMetrics:
              datasourceUid: prometheus
              spanStartTimeShift: "-1h"
              spanEndTimeShift: "1h"
              tags:
                - key: service.name
                  value: service
              queries:
                - name: Request rate
                  query: 'sum(rate(traces_spanmetrics_calls_total{${__tags}}[5m]))'
                - name: Error rate
                  query: 'sum(rate(traces_spanmetrics_calls_total{${__tags},status_code="STATUS_CODE_ERROR"}[5m]))'
                - name: Duration (p95)
                  query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{${__tags}}[5m])) by (le))'
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            search:
              hide: false
            traceQuery:
              timeShiftEnabled: true
              spanStartTimeShift: "1h"
              spanEndTimeShift: "-1h"
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
      envFromSecret: grafana-secret
      grafana.ini:
        news:
          news_feed_enabled: false
        server:
          root_url: https://grafana.ringbell.cc
        auth:
          signout_redirect_url: https://auth.ringbell.cc/logout
          oauth_allow_insecure_email_lookup: true
        auth.generic_oauth:
          enabled: true
          name: Authelia
          icon: signin
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email groups
          auth_url: https://auth.ringbell.cc/api/oidc/authorization
          token_url: https://auth.ringbell.cc/api/oidc/token
          api_url: https://auth.ringbell.cc/api/oidc/userinfo
          login_attribute_path: email
          name_attribute_path: name
          email_attribute_path: email
          groups_attribute_path: groups
          role_attribute_path: "contains(groups[*], 'admins') && 'Admin' || 'Viewer'"
          use_pkce: true
          auto_login: true
          allow_sign_up: true

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true

    kubeApiServer:
      enabled: true

    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeEtcd:
      enabled: false
