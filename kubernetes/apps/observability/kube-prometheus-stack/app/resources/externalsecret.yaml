---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-secret
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: grafana
        property: oidc-client-secret
---
# Grafana admin (break-glass — primary auth is Authelia SSO). The chart random-
# generates admin-password each render (churn); sourcing it from 1Password makes
# it stable + known. Separate from grafana-secret because that one is consumed via
# envFromSecret, where hyphenated keys aren't valid env var names.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin
        property: admin-password
