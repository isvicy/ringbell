---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        HARBOR_ADMIN_PASSWORD: "{{ .admin_password }}"
        secretKey: "{{ .secret_key }}"
        CONFIG_OVERWRITE_JSON: |
          {
            "auth_mode": "oidc_auth",
            "oidc_name": "Authelia",
            "oidc_endpoint": "https://auth-tunnel.ringbell.cc",
            "oidc_client_id": "harbor",
            "oidc_client_secret": "{{ .oidc_client_secret }}",
            "oidc_groups_claim": "groups",
            "oidc_admin_group": "",
            "oidc_scope": "openid,profile,email,groups",
            "oidc_verify_cert": true,
            "oidc_auto_onboard": true,
            "oidc_user_claim": "preferred_username"
          }
  data:
    - secretKey: admin_password
      remoteRef:
        key: harbor
        property: admin-password
    - secretKey: secret_key
      remoteRef:
        key: harbor
        property: secret-key
    - secretKey: oidc_client_secret
      remoteRef:
        key: harbor
        property: oidc-client-secret
---
# Harbor's inter-service secrets (core↔jobservice↔registry auth + token-service
# cert + registry htpasswd). The chart regenerates these randomly on every render,
# which churned the Deployment checksums and forced rolls. Sourcing them from
# 1Password makes them stable (no churn -> no ignoreDifferences needed) and gives
# a predictable rebuild. Current live values were captured into 1Password verbatim,
# so adoption is a no-op on the running secrets. NOT the data-encryption secretKey
# (that stays in the `harbor` item / harbor-secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-internal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-internal
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: harbor-internal
        property: core-secret
    - secretKey: CSRF_KEY
      remoteRef:
        key: harbor-internal
        property: csrf-key
    - secretKey: tls.crt
      remoteRef:
        key: harbor-internal
        property: tls-crt
    - secretKey: tls.key
      remoteRef:
        key: harbor-internal
        property: tls-key
    - secretKey: JOBSERVICE_SECRET
      remoteRef:
        key: harbor-internal
        property: jobservice-secret
    - secretKey: REGISTRY_HTTP_SECRET
      remoteRef:
        key: harbor-internal
        property: registry-http-secret
    - secretKey: REGISTRY_PASSWD
      remoteRef:
        key: harbor-internal
        property: registry-passwd
    - secretKey: REGISTRY_HTPASSWD
      remoteRef:
        key: harbor-internal
        property: registry-htpasswd
