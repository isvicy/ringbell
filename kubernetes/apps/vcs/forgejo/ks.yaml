---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: forgejo
  namespace: flux-system
spec:
  targetNamespace: vcs
  path: ./kubernetes/apps/vcs/forgejo/app
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 10m
  prune: true
  wait: true
  dependsOn:
    - name: rook-ceph-cluster
    - name: external-secrets-store
    - name: authelia
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
