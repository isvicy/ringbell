---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      version: "17.0.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    replicaCount: 1
    strategy:
      type: Recreate

    image:
      rootless: true

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22

    persistence:
      enabled: true
      create: true
      size: 20Gi
      accessModes:
        - ReadWriteOnce
      storageClass: local-nvme

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi

    # Bundled DB sub-charts stay disabled — SQLite keeps the stack small.
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false
    valkey-cluster:
      enabled: false
    valkey:
      enabled: false
    redis:
      enabled: false

    gitea:
      admin:
        existingSecret: forgejo-admin
        passwordMode: keepUpdated

      oauth:
        - name: authelia
          provider: openidConnect
          existingSecret: forgejo-oauth
          autoDiscoverUrl: https://auth.ringbell.cc/.well-known/openid-configuration

      config:
        database:
          DB_TYPE: sqlite3
        server:
          DOMAIN: git.ringbell.cc
          ROOT_URL: https://git.ringbell.cc
          SSH_DOMAIN: git.ringbell.cc
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
          LANDING_PAGE: login
        service:
          DISABLE_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: false
          ENABLE_NOTIFY_MAIL: false
        session:
          PROVIDER: memory
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          USERNAME: preferred_username
          UPDATE_AVATAR: true
          ACCOUNT_LINKING: login
        repository:
          DEFAULT_BRANCH: main
          ENABLE_PUSH_CREATE_USER: true
          ENABLE_PUSH_CREATE_ORG: true
        "repository.pull-request":
          DEFAULT_MERGE_STYLE: squash
        log:
          LEVEL: Info
          MODE: console
