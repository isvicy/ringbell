---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-mirror
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gitea-mirror
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: gitea-mirror
        property: github-token
    - secretKey: GITEA_TOKEN
      remoteRef:
        key: gitea-mirror
        property: gitea-token
    - secretKey: BETTER_AUTH_SECRET
      remoteRef:
        key: gitea-mirror
        property: better-auth-secret
    - secretKey: ENCRYPTION_SECRET
      remoteRef:
        key: gitea-mirror
        property: encryption-secret
