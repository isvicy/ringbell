---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-mirror-data
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-nvme
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-mirror
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gitea-mirror
  ports:
    - name: http
      port: 4321
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-mirror
  labels:
    app.kubernetes.io/name: gitea-mirror
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-mirror
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-mirror
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: gitea-mirror
          image: ghcr.io/raylabshq/gitea-mirror:3.7.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4321
          env:
            - name: PORT
              value: "4321"
            - name: GITEA_URL
              value: https://git.ringbell.cc
            - name: SCHEDULE_ENABLED
              value: "true"
            - name: GITEA_MIRROR_INTERVAL
              value: 8h
          envFrom:
            - secretRef:
                name: gitea-mirror
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-mirror-data
