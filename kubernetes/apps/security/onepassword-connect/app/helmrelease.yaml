---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  interval: 30m
  chart:
    spec:
      chart: connect
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
  values:
    connect:
      credentialsName: onepassword-connect
      credentialsKey: 1password-credentials.json
    operator:
      create: false
