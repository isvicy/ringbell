---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  interval: 30m
  chart:
    spec:
      chart: connect
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
  values:
    connect:
      credentials_json:
        existingSecret: onepassword-connect
        key: 1password-credentials.json
    operator:
      create: false
