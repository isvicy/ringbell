---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-store
  namespace: flux-system
spec:
  targetNamespace: security
  path: ./kubernetes/apps/security/external-secrets-store/app
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: false
  dependsOn:
    - name: external-secrets
