---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rook-ceph-cluster
  namespace: flux-system
spec:
  targetNamespace: storage
  path: ./kubernetes/apps/storage/rook-ceph-cluster/app
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 30m
  retryInterval: 1m
  timeout: 15m
  prune: true
  wait: false
  dependsOn:
    - name: rook-ceph
    - name: snapshot-controller
