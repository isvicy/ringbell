---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 30m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "1.16.5"
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    operatorNamespace: storage

    cephClusterSpec:
      cephVersion:
        image: quay.io/ceph/ceph:v19.2.2
      dataDirHostPath: /var/lib/rook

      mon:
        count: 3
        allowMultiplePerNode: false

      mgr:
        count: 1

      dashboard:
        enabled: true
        ssl: false

      network:
        provider: host

      placement:
        mon:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists

      storage:
        useAllNodes: false
        useAllDevices: false
        nodes:
          - name: w-01
            devices:
              - name: vdb
                config:
                  deviceClass: nvme
              - name: vdc
                config:
                  deviceClass: hdd
          - name: w-02
            devices:
              - name: vdb
                config:
                  deviceClass: nvme
              - name: vdc
                config:
                  deviceClass: hdd

      resources:
        mon:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 1Gi
        osd:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            memory: 2Gi
        mgr:
          requests:
            cpu: 125m
            memory: 512Mi
          limits:
            memory: 1Gi

    cephBlockPools:
      - name: ceph-blockpool
        spec:
          failureDomain: host
          replicated:
            size: 2
          deviceClass: nvme
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: false
          reclaimPolicy: Retain
          allowVolumeExpansion: true
          parameters:
            imageFormat: "2"
            imageFeatures: layering,exclusive-lock,object-map,fast-diff,deep-flatten
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage

      - name: ceph-blockpool-hdd
        spec:
          failureDomain: host
          replicated:
            size: 2
          deviceClass: hdd
        storageClass:
          enabled: true
          name: ceph-bulk
          isDefault: false
          reclaimPolicy: Retain
          allowVolumeExpansion: true
          parameters:
            imageFormat: "2"
            imageFeatures: layering,exclusive-lock,object-map,fast-diff,deep-flatten
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage

    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool

    toolbox:
      enabled: true

    cephFileSystems: []
    cephObjectStores: []
