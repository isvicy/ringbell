---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
data:
  config.yaml: |
    tunnel: 632934dd-f7ca-456e-92eb-dacfb5043624
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:8080
    no-autoupdate: true
    ingress:
      - hostname: "*.ringbell.cc"
        service: https://cilium-gateway-external-auth.networking.svc.cluster.local:443
        originRequest:
          originServerName: ringbell.cc
      - service: http_status:404
