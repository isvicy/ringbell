name: cilium
namespace: kube-system
wave: 1
type: helm
adopted: true
repoURL: https://helm.cilium.io
chart: cilium
version: "1.19.2"
resources: true
# Hubble's mTLS certs (cilium-ca + server/relay certs) are auto-generated and
# rotated by cilium — non-idempotent by design, so the upstream-recommended Argo
# pattern is to ignore their /data (cilium docs: "Troubleshooting Cilium deployed
# with Argo CD"). These are correct to keep, not a workaround to remove. The
# envoy/relay ConfigMaps render deterministically in 1.19.2 (verified) and no
# longer need ignoring.
ignoreDifferences:
  - kind: Secret
    namespace: kube-system
    name: cilium-ca
    jsonPointers: ["/data"]
  - kind: Secret
    namespace: kube-system
    name: hubble-server-certs
    jsonPointers: ["/data"]
  - kind: Secret
    namespace: kube-system
    name: hubble-relay-client-certs
    jsonPointers: ["/data"]
