cluster:
  network:
    cni:
      name: none
  proxy:
    disabled: true

machine:
  install:
    image: factory.talos.dev/installer/c9078f9419961640c712a8bf2bb9174933dfcf1da383fd8ea2b7dc21493f8bac:v1.12.6
  disks:
    - device: /dev/vdb
      partitions:
        - mountpoint: /var/mnt/nvme
  kubelet:
    extraMounts:
      - destination: /var/mnt/nvme
        type: bind
        source: /var/mnt/nvme
        options: ["bind", "rshared", "rw"]
  udev:
    rules:
      - ACTION=="add|change", KERNEL=="vd[b-z]", SUBSYSTEM=="block", ATTR{queue/rotational}="0"
  files:
    - content: |
        [plugins."io.containerd.cri.v1.images"]
          discard_unpacked_layers = false
      path: /etc/cri/conf.d/20-customization.part
      op: create
